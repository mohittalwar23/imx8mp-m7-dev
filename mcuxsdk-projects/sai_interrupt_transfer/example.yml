      - examples/driver_examples/sai/interrupt_transfer/readme.md
      - ${board_root}/${board}/driver_examples/sai/interrupt_transfer/example_board_readme.md
      - ${board_root}/${board}/examples_shared_readme.md
      name: sai_interrupt_transfer${core_id_suffix_name}
    meta_path: examples/driver_examples/sai/interrupt_transfer
    project-root-path: boards/${board}/driver_examples/sai/interrupt_transfer/${multicore_foldername}
  section-type: freestanding_application
