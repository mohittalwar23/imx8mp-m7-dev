sai_interrupt_transfer:
  boards:
    evkmimx8mp:
    - -armgcc@ddr_debug
    - -armgcc@ddr_release
    - -armgcc@flash_debug
    - -armgcc@flash_release
    - -iar@ddr_debug
    - -iar@ddr_release
    - -iar@flash_debug
    - -iar@flash_release
  contents:
    document:
      brief: The sai_interrupt_transfer example shows how to use sai driver with interrupt:In
