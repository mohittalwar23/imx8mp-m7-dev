sai_interrupt_record_playback:
  boards:
    evkmimx8mp:
    - -armgcc@ddr_debug
    - -armgcc@ddr_release
    - -armgcc@flash_debug
    - -armgcc@flash_release
    - -iar@ddr_debug
    - -iar@ddr_release
    - -iar@flash_debug
    - -iar@flash_release
  contents:
    document:
      brief: 'The sai_interrupt_record_playback example shows how to use sai driver
        with record and playback features: In this example, one sai instance record
        the audio data from input and playbacks the audio data.'
      category: driver_examples/sai
      example_readme:
      - examples/driver_examples/sai/interrupt_record_playback/readme.md
      - ${board_root}/${board}/driver_examples/sai/interrupt_record_playback/example_board_readme.md
      - ${board_root}/${board}/examples_shared_readme.md
      name: sai_interrupt_record_playback${core_id_suffix_name}
    meta_path: examples/driver_examples/sai/interrupt_record_playback
    project-root-path: boards/${board}/driver_examples/sai/interrupt_record_playback/${multicore_foldername}
  section-type: freestanding_application
